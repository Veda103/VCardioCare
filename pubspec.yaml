name: vcardiocare
description: Heart Health Risk Predictor — VCardioCare

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  
  # Fonts
  google_fonts: ^6.2.1

  # State & Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Local DB
  sqflite: ^2.3.3
  path: ^1.9.0

  # Network
  dio: ^5.4.3

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  # Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true