<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background gradient-like square -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A89A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D8937F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="45" fill="url(#bgGradient)"/>
  
  <!-- Heart shape - simplified -->
  <path d="M 96 140 C 70 120 50 105 50 85 C 50 72 59 62 71 62 C 77 62 83 65 96 75 C 109 65 115 62 121 62 C 133 62 142 72 142 85 C 142 105 122 120 96 140 Z" 
        fill="white" opacity="0.95"/>
  
  <!-- Pulse lines for heartbeat -->
  <line x1="60" y1="50" x2="70" y2="50" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <polyline points="75,50 80,45 85,55 90,50" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <line x1="95" y1="50" x2="130" y2="50" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>